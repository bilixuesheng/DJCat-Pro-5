name: Build and Release DJCat Pro

on:
  workflow_dispatch:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.8' # 更新为你需要的版本

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Nuitka
          pip install .

      - name: Extract Version (Safe Method)
        shell: pwsh
        run: |
          # 使用 Python 读取文件文本而不导入模块，避开 qfluentwidgets 的打印信息
          $VERSION = python -c "import re; content = open('app/common/config.py', encoding='utf-8').read(); print(re.search(r'VERSION = \"(.*?)\"', content).group(1))"
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV
          Write-Host "Detected Version: $VERSION"

      - name: Build with Nuitka
        run: |
          python deploy.py

      - name: Create Zip Archive
        shell: pwsh
        run: |
          $distPath = "dist/djcat.dist"
          $zipFile = "DJCat-Pro-v${{ env.VERSION }}-Windows-x86_64.zip"
          7z a -tzip -mx=9 -m0=LZMA $zipFile dist/djcat.dist/*

      - name: Upload Artifacts (For Manual Run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: DJCat-Pro-v${{ env.VERSION }}-Windows-x86_64
          path: dist/djcat.dist

      - name: Upload to Release (For Release Published)
        uses: softprops/action-gh-release@v2
        if: ${{ github.event_name == 'release' }}
        with:
          files: DJCat-Pro-v${{ env.VERSION }}-Windows-x86_64.zip
