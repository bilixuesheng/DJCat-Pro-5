name: Build and Release DJCat Pro

on:
  workflow_dispatch:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.8'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Nuitka
          pip install .

      - name: Extract Version
        shell: pwsh
        run: |
          # 提取 config.py 中的版本号，写入 GitHub 环境变量
          python -c "from app.common.config import VERSION; print(f'VERSION={VERSION}')" >> $env:GITHUB_ENV

      - name: Build with Nuitka
        run: |
          python deploy.py

      - name: Create Zip Archive
        shell: pwsh
        run: |
          $distPath = "dist/djcat.dist"
          $zipFile = "DJCat-Pro-v${{ env.VERSION }}-Windows-x86_64.zip"
          
          Write-Output "正在将 $distPath 的内容压缩到 $zipFile ..."
          7z a -tzip -mx=9 -m0=LZMA $zipFile dist/djcat.dist/*
          Write-Output "压缩完成！"

      - name: Upload Artifacts (For Manual Run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: DJCat-Pro-v${{ env.VERSION }}-Windows-x86_64
          path: dist/djcat.dist

      - name: Upload to Release (For Release Published)
        uses: softprops/action-gh-release@v2
        if: ${{ github.event_name == 'release' }}
        with:
          files: DJCat-Pro-v${{ env.VERSION }}-Windows-x86_64.zip
