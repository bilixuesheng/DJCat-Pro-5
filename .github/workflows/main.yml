name: Build and Release DJCat Pro

on:
  workflow_dispatch:
  release:
    types: [ published ]

permissions:
  contents: write

env:
  # 关键：强制 Python 在整个环境中开启 UTF-8 模式，彻底解决编码问题
  PYTHONUTF8: 1

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.8'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Nuitka
          pip install .

      - name: Extract Version (Safe PowerShell Way)
        shell: pwsh
        run: |
          $configPath = "app/common/config.py"
          $content = Get-Content $configPath -Raw
          if ($content -match 'VERSION\s*=\s*"([^"]+)"') {
              $VERSION = $Matches[1]
              "VERSION=$VERSION" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              Write-Host "Detected Version: $VERSION"
          } else {
              Write-Error "Could not find VERSION in $configPath"
              exit 1
          }

      - name: Build with Nuitka
        run: |
          python deploy.py

      - name: Create Zip Archive
        shell: pwsh
        run: |
          $distPath = "dist/djcat.dist"
          $zipFile = "DJCat-Pro-v${{ env.VERSION }}-Windows-x86_64.zip"
          # 使用 7z 压缩打包好的 dist 目录
          7z a -tzip -mx=9 -m0=LZMA $zipFile "./$distPath/*"

      - name: Upload Artifacts (For Manual Run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: DJCat-Pro-v${{ env.VERSION }}-Windows-x86_64
          path: dist/djcat.dist

      - name: Upload to Release (For Release Published)
        uses: softprops/action-gh-release@v2
        if: ${{ github.event_name == 'release' }}
        with:
          files: DJCat-Pro-v${{ env.VERSION }}-Windows-x86_64.zip
